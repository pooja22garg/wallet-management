spring:
  application:
    name: wallet-management
  # Use the dev profile unless one is explicitly selected (e.g. SPRING_PROFILES_ACTIVE=prod).
  profiles:
    default: dev
  datasource:
    url: jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
    open-in-view: false